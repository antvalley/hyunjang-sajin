<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>현장사진</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root {
  --bg:#F4F2EE;--card:#FFFFFF;--border:#DDD9D0;--accent:#D4500A;--accent2:#A83D07;
  --text:#1A1714;--muted:#857F77;--success:#2E7D32;--r:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;padding-top:calc(14px + env(safe-area-inset-top,0px));background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.logo{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;animation:fadeUp .25s ease both;}
.card:nth-child(2){animation-delay:.05s;}.card:nth-child(3){animation-delay:.1s;}
.card-header{padding:12px 14px 0;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}
.photo-zone{position:relative;padding:22px 14px;text-align:center;cursor:pointer;transition:background .15s;}
.photo-zone:active{background:#FAF7F3;}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.photo-zone-icon{font-size:38px;margin-bottom:8px;line-height:1;}
.photo-zone-text{font-size:15px;font-weight:700;}
.photo-zone-hint{font-size:12px;color:var(--muted);margin-top:4px;}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:0 0 2px;}
.thumb{position:relative;aspect-ratio:1;background:var(--border);overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb .del{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.thumb .num{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;border-radius:4px;padding:1px 5px;}
.add-more{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:22px;color:var(--muted);cursor:pointer;position:relative;}
.add-more input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.field-inner{padding:10px 14px 14px;}
textarea,input[type=text]{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;padding:11px 13px;outline:none;transition:border-color .15s;-webkit-appearance:none;}
textarea:focus,input[type=text]:focus{border-color:var(--accent);}
textarea{resize:none;min-height:72px;}
.filename-preview{margin:0 14px 14px;background:#FFF8F3;border:1px solid #F0C9A8;border-radius:8px;padding:9px 12px;font-size:12px;color:var(--accent2);display:flex;align-items:center;gap:6px;word-break:break-all;}
.date-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:var(--muted);}
.date-bar .date-val{font-weight:700;color:var(--text);font-size:14px;}
.progress-card{display:none;}.progress-card.show{display:block;}
.prog-bar-bg{height:5px;background:var(--border);border-radius:20px;overflow:hidden;margin:10px 14px 0;}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:20px;width:0%;transition:width .3s ease;}
.prog-label{font-size:12px;color:var(--muted);padding:7px 14px 12px;}
.log-item{padding:11px 14px;border-top:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;font-size:13px;}
.log-item:first-child{border-top:none;}
.log-icon{font-size:16px;flex-shrink:0;}
.log-name{font-weight:500;word-break:break-all;}
.log-link{font-size:11px;color:var(--accent);margin-top:2px;}
.log-link a{color:inherit;text-decoration:none;}
.bottom-bar{padding:10px 14px;padding-bottom:calc(10px + var(--safe-bottom));background:var(--card);border-top:1px solid var(--border);flex-shrink:0;}
.upload-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;}
.upload-btn:active{background:var(--accent2);transform:scale(.98);}
.upload-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">🏗</div>
      <div>
        <div class="topbar-title">현장사진</div>
        <div class="topbar-sub">우이신설 연장선</div>
      </div>
    </div>
  </div>
  <div class="scroll-body">
    <div class="card">
      <div class="photo-zone" id="photoZone">
        <input type="file" accept="image/*" multiple capture="environment" id="fileInput" onchange="handleFiles(this.files)">
        <div class="photo-zone-icon">📷</div>
        <div class="photo-zone-text">사진 선택 / 촬영</div>
        <div class="photo-zone-hint">여러 장 동시 선택 가능</div>
      </div>
      <div class="preview-grid" id="previewGrid" style="display:none"></div>
    </div>
    <div class="card">
      <div class="card-header" style="padding-bottom:8px">사진 설명</div>
      <div class="field-inner" style="padding-top:8px">
        <textarea id="desc" placeholder="예) 방학역 환기구 배근 현황&#10;예) 비개착 구간 지보공 설치 완료" rows="3" oninput="updateFilename()"></textarea>
      </div>
      <div class="filename-preview">🗂 <span id="previewName">20260330_설명입력.jpg</span></div>
    </div>
    <div class="card">
      <div class="date-bar">
        <span>📅</span><span>촬영일</span>
        <span class="date-val" id="dateVal"></span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">자동 설정</span>
      </div>
    </div>
    <div class="card progress-card" id="progressCard">
      <div class="card-header" style="padding:12px 14px 0">업로드 현황</div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel">대기 중</div>
      <div id="logContainer"></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="upload-btn" id="uploadBtn" onclick="startUpload()" disabled>
      ☁️ Google Drive에 저장
    </button>
  </div>
</div>

<script>
// ── Apps Script 웹앱 URL ──
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfpZGVHmAxXQhXc4wBDuE7w1ZWT5ny9HLJiTDT8Am7iBvQio2mIP2Fyg_eo_6zKBrxWw/exec';

let files = [];

// ── 날짜 ──
function nowKST() {
  const d = new Date(Date.now() + 9*60*60*1000);
  return d.toISOString().slice(0,10);
}
function todayCompact() { return nowKST().replace(/-/g,''); }
document.getElementById('dateVal').textContent = nowKST();

// ── 파일명 미리보기 ──
function updateFilename() {
  const desc = document.getElementById('desc').value.trim();
  const safe = desc ? desc.replace(/[\/\\:*?"<>| \t]/g,'').slice(0,30) : '사진';
  const ext  = files.length ? files[0].file.name.split('.').pop() : 'jpg';
  const multi= files.length > 1 ? '_01' : '';
  document.getElementById('previewName').textContent = `${todayCompact()}_${safe}${multi}.${ext}`;
}

// ── 파일 처리 ──
function handleFiles(fl) {
  for (const f of fl)
    if (!files.find(x=>x.file.name===f.name&&x.file.size===f.size))
      files.push({file:f, url:URL.createObjectURL(f)});
  renderGrid(); updateFilename();
  document.getElementById('uploadBtn').disabled = files.length === 0;
}

function renderGrid() {
  const grid = document.getElementById('previewGrid');
  const zone = document.getElementById('photoZone');
  if (!files.length) { grid.style.display='none'; zone.style.display=''; return; }
  zone.style.display='none'; grid.style.display='grid'; grid.innerHTML='';
  files.forEach(({url},i)=>{
    const d=document.createElement('div'); d.className='thumb';
    d.innerHTML=`<img src="${url}"><button class="del" onclick="removeFile(${i})">✕</button><span class="num">${i+1}</span>`;
    grid.appendChild(d);
  });
  const add=document.createElement('div'); add.className='add-more';
  add.innerHTML=`<input type="file" accept="image/*" multiple onchange="handleFiles(this.files)">+`;
  grid.appendChild(add);
}

function removeFile(i) {
  URL.revokeObjectURL(files[i].url); files.splice(i,1);
  renderGrid(); updateFilename();
  document.getElementById('uploadBtn').disabled = files.length === 0;
}

// ── 업로드 ──
async function startUpload() {
  if (!files.length) return;
  const desc = document.getElementById('desc').value.trim();
  const safe = desc ? desc.replace(/[\/\\:*?"<>| \t]/g,'').slice(0,30) : '사진';

  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('progressCard').classList.add('show');
  document.getElementById('logContainer').innerHTML = '';

  let successCount = 0;

  for (let i = 0; i < files.length; i++) {
    const {file} = files[i];
    const pct = Math.round(10 + (i / files.length) * 85);
    setProgress(pct, `업로드 중 (${i+1}/${files.length})`);

    const ext   = file.name.split('.').pop();
    const num   = files.length > 1 ? `_${String(i+1).padStart(2,'0')}` : '';
    const fname = `${todayCompact()}_${safe}${num}.${ext}`;

    try {
      // 파일을 base64로 변환
      const base64 = await toBase64(file);

      // Apps Script로 전송
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          image:    base64,
          mimeType: file.type,
          filename: fname,
          desc:     desc || fname,
        })
      });

      const data = await res.json();
      if (data.ok) {
        addLog('✅', fname, data.fileUrl);
        successCount++;
      } else {
        addLog('❌', fname + ' — ' + (data.error || '오류'));
      }
    } catch(e) {
      addLog('❌', fname + ' — ' + e.message);
    }
  }

  setProgress(100, `완료 — ${successCount}/${files.length}장 저장됨`);
  files = []; renderGrid(); updateFilename();
  document.getElementById('desc').value = '';
  document.getElementById('uploadBtn').disabled = true;
}

// ── base64 변환 ──
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── UI ──
function setProgress(pct, label) {
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = label;
}
function addLog(icon, name, link) {
  const d = document.createElement('div'); d.className='log-item';
  d.innerHTML=`<span class="log-icon">${icon}</span><div><div class="log-name">${name}</div>${link?`<div class="log-link"><a href="${link}" target="_blank">Drive에서 열기 →</a></div>`:''}</div>`;
  document.getElementById('logContainer').appendChild(d);
}

window.addEventListener('load', updateFilename);
</script>
</body>
</html>
