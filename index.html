<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>현장사진</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--bg:#F4F2EE;--card:#FFF;--border:#DDD9D0;--accent:#D4500A;--accent2:#A83D07;--text:#1A1714;--muted:#857F77;--r:14px;--safe-bottom:env(safe-area-inset-bottom,0px);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 18px 10px;padding-top:calc(14px + env(safe-area-inset-top,0px));background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--muted);}
.scroll-body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
.card-header{padding:12px 14px 0;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;}
.field-inner{padding:10px 14px 14px;}
textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;padding:11px 13px;outline:none;resize:none;min-height:72px;}
textarea:focus{border-color:var(--accent);}
.filename-preview{margin:0 14px 14px;background:#FFF8F3;border:1px solid #F0C9A8;border-radius:8px;padding:9px 12px;font-size:12px;color:var(--accent2);word-break:break-all;}
.date-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:var(--muted);}
.date-bar b{color:var(--text);}

/* 사진 버튼 */
.photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;}
.pbtn{border:2px dashed var(--border);border-radius:12px;background:var(--bg);padding:20px 10px;text-align:center;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:border-color .15s;width:100%;}
.pbtn:active{border-color:var(--accent);}
.pbtn-icon{font-size:30px;margin-bottom:8px;}
.pbtn-text{font-size:13px;font-weight:700;display:block;}
.pbtn-hint{font-size:11px;color:var(--muted);display:block;margin-top:2px;}

/* 미리보기 */
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:2px;}
.thumb{position:relative;aspect-ratio:1;background:var(--border);overflow:hidden;border-radius:4px;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb .del{position:absolute;top:3px;right:3px;width:22px;height:22px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.thumb .num{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;border-radius:4px;padding:1px 5px;}
.add-more-btn{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:24px;color:var(--muted);cursor:pointer;border-radius:4px;}

.progress-card{display:none;}.progress-card.show{display:block;}
.prog-bar-bg{height:5px;background:var(--border);border-radius:20px;overflow:hidden;margin:10px 14px 0;}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:20px;width:0%;transition:width .3s;}
.prog-label{font-size:12px;color:var(--muted);padding:7px 14px 12px;}
.log-item{padding:11px 14px;border-top:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;font-size:13px;}
.log-item:first-child{border-top:none;}
.log-icon{font-size:16px;flex-shrink:0;}
.log-name{font-weight:500;word-break:break-all;}
.log-link{font-size:11px;color:var(--accent);margin-top:2px;}
.log-link a{color:inherit;text-decoration:none;}
.bottom-bar{padding:10px 14px;padding-bottom:calc(10px + var(--safe-bottom));background:var(--card);border-top:1px solid var(--border);flex-shrink:0;}
.upload-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.upload-btn:active{background:var(--accent2);}
.upload-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">🏗</div>
    <div>
      <div class="topbar-title">현장사진</div>
      <div class="topbar-sub">우이신설 연장선</div>
    </div>
  </div>

  <div class="scroll-body">
    <div class="card">
      <div class="photo-btns">
        <!-- 카메라: input을 숨기고 버튼 클릭으로 트리거 -->
        <button class="pbtn" onclick="document.getElementById('cameraInput').click()">
          <div class="pbtn-icon">📷</div>
          <span class="pbtn-text">카메라 촬영</span>
          <span class="pbtn-hint">지금 찍기</span>
        </button>
        <button class="pbtn" onclick="document.getElementById('galleryInput').click()">
          <div class="pbtn-icon">🖼️</div>
          <span class="pbtn-text">갤러리 선택</span>
          <span class="pbtn-hint">여러 장 가능</span>
        </button>
      </div>
      <!-- 숨겨진 파일 input -->
      <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none" onchange="handleFiles(this.files)">
      <input type="file" accept="image/*" multiple id="galleryInput" style="display:none" onchange="handleFiles(this.files)">

      <div class="preview-grid" id="previewGrid" style="display:none"></div>
    </div>

    <div class="card">
      <div class="card-header" style="padding-bottom:8px">사진 설명</div>
      <div class="field-inner" style="padding-top:8px">
        <textarea id="desc" placeholder="예) 방학역 환기구 배근 현황&#10;예) 비개착 구간 지보공 설치 완료" rows="3" oninput="updateFilename()"></textarea>
      </div>
      <div class="filename-preview">🗂 <span id="previewName">20260330_사진.jpg</span></div>
    </div>

    <div class="card">
      <div class="date-bar">📅 촬영일 <b id="dateVal"></b>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">자동</span>
      </div>
    </div>

    <div class="card progress-card" id="progressCard">
      <div class="card-header" style="padding:12px 14px 0">업로드 현황</div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel">대기 중</div>
      <div id="logContainer"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="upload-btn" id="uploadBtn" onclick="startUpload()" disabled>
      ☁️ Google Drive에 저장
    </button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfpZGVHmAxXQhXc4wBDuE7w1ZWT5ny9HLJiTDT8Am7iBvQio2mIP2Fyg_eo_6zKBrxWw/exec';

let files = [];

function nowKST() {
  const d = new Date(Date.now() + 9*60*60*1000);
  return d.toISOString().slice(0,10);
}
function todayCompact() { return nowKST().replace(/-/g,''); }
document.getElementById('dateVal').textContent = nowKST();

function updateFilename() {
  const desc = document.getElementById('desc').value.trim();
  const safe = desc ? desc.replace(/[\/\\:*?"<>| \t]/g,'').slice(0,30) : '사진';
  const ext  = files.length ? files[0].file.name.split('.').pop() : 'jpg';
  const multi = files.length > 1 ? '_01' : '';
  document.getElementById('previewName').textContent = `${todayCompact()}_${safe}${multi}.${ext}`;
}

function handleFiles(fl) {
  if (!fl || !fl.length) return;
  for (const f of fl) {
    if (!files.find(x => x.file.name===f.name && x.file.size===f.size))
      files.push({file:f, url:URL.createObjectURL(f)});
  }
  renderGrid();
  updateFilename();
  document.getElementById('uploadBtn').disabled = false;
}

function renderGrid() {
  const grid = document.getElementById('previewGrid');
  if (!files.length) { grid.style.display='none'; return; }
  grid.style.display = 'grid';
  grid.innerHTML = '';
  files.forEach(({url}, i) => {
    const d = document.createElement('div');
    d.className = 'thumb';
    const img = document.createElement('img');
    img.src = url;
    const del = document.createElement('button');
    del.className='del'; del.textContent='✕';
    del.onclick = () => removeFile(i);
    const num = document.createElement('span');
    num.className='num'; num.textContent = i+1;
    d.append(img, del, num);
    grid.appendChild(d);
  });
  const add = document.createElement('div');
  add.className = 'add-more-btn';
  add.textContent = '+';
  add.onclick = () => document.getElementById('galleryInput').click();
  grid.appendChild(add);
}

function removeFile(i) {
  URL.revokeObjectURL(files[i].url);
  files.splice(i,1);
  renderGrid(); updateFilename();
  document.getElementById('uploadBtn').disabled = (files.length === 0);
}

async function startUpload() {
  if (!files.length) return;
  const desc = document.getElementById('desc').value.trim();
  const safe = desc ? desc.replace(/[\/\\:*?"<>| \t]/g,'').slice(0,30) : '사진';

  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('progressCard').classList.add('show');
  document.getElementById('logContainer').innerHTML = '';

  let ok = 0;
  for (let i = 0; i < files.length; i++) {
    const {file} = files[i];
    setProgress(Math.round(5 + (i/files.length)*85), `처리 중 (${i+1}/${files.length})`);
    const num   = files.length > 1 ? `_${String(i+1).padStart(2,'0')}` : '';
    const fname = `${todayCompact()}_${safe}${num}.jpg`;
    try {
      const base64 = await toBase64Compressed(file);
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({image:base64, mimeType:'image/jpeg', filename:fname, desc:desc||fname})
      });
      const data = await res.json();
      if (data.ok) {
        addLog('✅', fname, data.fileUrl);
        ok++;
      } else {
        addLog('❌', fname + ' — ' + (data.error||'오류'), null);
      }
    } catch(e) {
      addLog('❌', fname + ' — ' + e.message, null);
    }
  }

  setProgress(100, `완료 — ${ok}/${files.length}장 저장됨`);
  files = []; renderGrid(); updateFilename();
  document.getElementById('desc').value = '';
  document.getElementById('uploadBtn').disabled = true;
}

function toBase64Compressed(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
          else       { w = Math.round(w*MAX/h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.82).split(',')[1]);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function setProgress(pct, label) {
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = label;
}

function addLog(icon, name, link) {
  const d = document.createElement('div'); d.className='log-item';
  d.innerHTML = `<span class="log-icon">${icon}</span><div><div class="log-name">${name}</div>${link?`<div class="log-link"><a href="${link}" target="_blank">Drive에서 열기 →</a></div>`:''}</div>`;
  document.getElementById('logContainer').appendChild(d);
}

window.addEventListener('load', updateFilename);
</script>
</body>
</html>
